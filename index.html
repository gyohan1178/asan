<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>59A 사전점검 체크리스트</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap');
:root{
  --bg:#f4f5f7;--card:#fff;--border:#e4e7ec;--text:#1a1f2e;--sub:#6b7280;
  --ok:#16a34a;--ok-bg:#f0fdf4;--ok-border:#bbf7d0;
  --ng:#dc2626;--ng-bg:#fef2f2;--ng-border:#fecaca;
  --skip:#9ca3af;--skip-bg:#f9fafb;
  --accent:#2563eb;--accent-bg:#eff6ff;
  --warn:#d97706;--warn-bg:#fffbeb;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);font-family:'Noto Sans KR',sans-serif;color:var(--text);min-height:100vh;padding-bottom:120px;}

/* ── HEADER ── */
.hdr{
  background:#1a1f2e;color:#fff;padding:16px 18px 14px;
  position:sticky;top:0;z-index:100;
  box-shadow:0 2px 12px rgba(0,0,0,0.18);
}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.hdr-title{font-size:15px;font-weight:700;letter-spacing:-0.3px;}
.hdr-date{font-size:11px;color:#94a3b8;margin-top:2px;}
.badge-hdr{font-size:10px;background:#2563eb;color:#fff;padding:3px 8px;border-radius:20px;font-weight:600;}

/* Progress Bar */
.prog-wrap{background:rgba(255,255,255,0.12);border-radius:999px;height:6px;overflow:hidden;}
.prog-bar{height:100%;border-radius:999px;background:linear-gradient(90deg,#22c55e,#16a34a);transition:width 0.4s ease;}
.prog-info{display:flex;justify-content:space-between;margin-top:6px;font-size:10.5px;color:#94a3b8;}
.prog-count{color:#4ade80;font-weight:600;}

/* ── STATS STRIP ── */
.stats{display:flex;gap:8px;padding:12px 16px;}
.stat{flex:1;background:var(--card);border-radius:10px;padding:9px 10px;text-align:center;border:1px solid var(--border);}
.stat-num{font-size:18px;font-weight:700;line-height:1;}
.stat-lbl{font-size:9.5px;color:var(--sub);margin-top:3px;letter-spacing:0.2px;}
.stat.ok .stat-num{color:var(--ok);}
.stat.ng .stat-num{color:var(--ng);}
.stat.rem .stat-num{color:var(--accent);}

/* ── SECTION ── */
.sec{margin:0 12px 8px;}
.sec-hdr{
  display:flex;align-items:center;gap:8px;padding:11px 14px;
  background:var(--card);border:1px solid var(--border);
  border-radius:12px 12px 0 0;cursor:pointer;
  border-bottom:2px solid var(--accent);
  position:sticky;top:88px;z-index:50;
}
.sec-hdr.collapsed{border-radius:12px;border-bottom:1px solid var(--border);}
.sec-icon{font-size:18px;width:28px;text-align:center;}
.sec-name{font-size:13.5px;font-weight:700;flex:1;}
.sec-prog{font-size:11px;color:var(--sub);}
.sec-arrow{font-size:11px;color:var(--sub);transition:transform 0.2s;}
.sec-hdr.collapsed .sec-arrow{transform:rotate(-90deg);}
.sec-body{background:var(--card);border:1px solid var(--border);border-top:none;border-radius:0 0 12px 12px;overflow:hidden;}
.sec-body.hidden{display:none;}

/* ── ITEM ── */
.item{border-bottom:1px solid var(--border);padding:11px 14px;transition:background 0.15s;}
.item:last-child{border-bottom:none;}
.item-top{display:flex;align-items:flex-start;gap:10px;}
.item-text{flex:1;}
.item-name{font-size:13px;font-weight:500;line-height:1.4;}
.item-desc{font-size:11px;color:var(--sub);margin-top:2px;line-height:1.5;}
.item-warn{font-size:10.5px;color:var(--warn);margin-top:3px;font-weight:500;}

/* Buttons */
.btns{display:flex;gap:6px;margin-top:9px;}
.cBtn{
  flex:1;padding:8px 4px;border-radius:8px;border:1.5px solid var(--border);
  background:transparent;font-family:inherit;font-size:12px;font-weight:600;
  cursor:pointer;transition:all 0.15s;color:var(--sub);
}
.cBtn.ok{background:var(--ok-bg);border-color:var(--ok-border);color:var(--ok);}
.cBtn.ng{background:var(--ng-bg);border-color:var(--ng-border);color:var(--ng);}
.cBtn.skip{background:var(--skip-bg);border-color:#e5e7eb;color:var(--skip);}

/* Memo */
.memo-wrap{margin-top:8px;display:none;}
.memo-wrap.show{display:block;}
.memo{width:100%;padding:8px 10px;border:1px solid var(--ng-border);border-radius:8px;font-family:inherit;font-size:12px;color:var(--text);background:var(--ng-bg);resize:none;min-height:56px;outline:none;}
.memo:focus{border-color:var(--ng);}

/* State highlight */
.item.state-ok{background:var(--ok-bg);}
.item.state-ng{background:var(--ng-bg);}
.item.state-skip{background:var(--skip-bg);}

/* ── BOTTOM BAR ── */
.bot{
  position:fixed;bottom:0;left:0;right:0;
  background:#1a1f2e;padding:7px 10px;
  box-shadow:0 -3px 14px rgba(0,0,0,0.2);
  display:flex;gap:7px;z-index:100;
}
.bot-btn{
  flex:1;padding:8px 6px;border-radius:8px;border:none;
  font-family:inherit;font-size:11px;font-weight:700;cursor:pointer;
}
.bot-btn.primary{background:#2563eb;color:#fff;}
.bot-btn.secondary{background:rgba(255,255,255,0.1);color:#94a3b8;}

/* ── MODAL ── */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:200;align-items:flex-end;}
.modal-bg.show{display:flex;}
.modal{background:#fff;border-radius:20px 20px 0 0;width:100%;max-height:80vh;overflow-y:auto;padding:20px 18px 32px;}
.modal-title{font-size:15px;font-weight:700;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--border);}
.ng-item{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);}
.ng-item:last-child{border-bottom:none;}
.ng-dot{width:8px;height:8px;border-radius:50%;background:var(--ng);margin-top:4px;flex-shrink:0;}
.ng-text{font-size:12.5px;line-height:1.5;}
.ng-memo{font-size:11px;color:var(--sub);margin-top:2px;}
.modal-close{width:100%;padding:13px;background:#f3f4f6;border:none;border-radius:10px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;margin-top:14px;}

/* ── 평면도 ── */
.fp-wrap{margin:0 12px 8px;border-radius:12px;overflow:hidden;border:1px solid var(--border);}
.fp-hdr{background:var(--card);padding:11px 14px;display:flex;align-items:center;gap:8px;cursor:pointer;}
.fp-icon{font-size:18px;}
.fp-title{font-size:13.5px;font-weight:700;flex:1;}
.fp-sub{font-size:11px;color:var(--sub);}
.fp-arrow{font-size:11px;color:var(--sub);transition:transform 0.2s;}
.fp-img-wrap{background:#f8f9fa;overflow:auto;max-height:60vh;}
.fp-img-wrap img{cursor:zoom-in;transition:transform 0.2s;}
.fp-img-wrap img.zoomed{cursor:zoom-out;transform-origin:top left;}
.fp-hint{text-align:center;padding:6px;font-size:10.5px;color:var(--sub);background:var(--card);}

.pwbox{margin:10px 12px 0;background:linear-gradient(135deg,#1e293b,#334155);
  border-radius:12px;padding:12px 14px;color:#fff;box-shadow:0 2px 8px rgba(0,0,0,.15);}
.pwbox-title{font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px;}
.pwbox-body{display:flex;gap:10px;margin-top:10px;flex-wrap:wrap;align-items:center;}
.pwbox.folded .pwbox-body{display:none;}
.pw-item{background:rgba(255,255,255,.12);border-radius:8px;padding:8px 14px;
  display:flex;flex-direction:column;align-items:center;min-width:90px;}
.pw-lbl{font-size:10px;color:#cbd5e1;}
.pw-val{font-size:22px;font-weight:800;letter-spacing:3px;font-family:monospace;color:#fbbf24;}
.pw-note{font-size:10px;color:#94a3b8;flex-basis:100%;margin-top:2px;}

.bot-btn.export{background:#fbbf24;color:#1a1f2e;}
</style>
</head>

// State
const state = {};
DATA.forEach(sec=>sec.items.forEach(it=>{state[it.id]={s:null,memo:''}}));

function save(){
  try{localStorage.setItem('checklist_59a', JSON.stringify(state));}catch(e){}
}
function load(){
  try{
    const d=localStorage.getItem('checklist_59a');
    if(d){const p=JSON.parse(d);Object.keys(p).forEach(k=>{if(state[k])Object.assign(state[k],p[k]);});}
  }catch(e){}
}

// Build UI
function build(){
  const wrap=document.getElementById('sections');
  DATA.forEach(sec=>{
    const div=document.createElement('div');
    div.className='sec';
    div.innerHTML=`
      <div class="sec-hdr" id="shdr_${sec.id}" onclick="toggleSec('${sec.id}')">
        <span class="sec-icon">${sec.icon}</span>
        <span class="sec-name">${sec.name}</span>
        <span class="sec-prog" id="sprog_${sec.id}"></span>
        <span class="sec-arrow">▾</span>
      </div>
      <div class="sec-body" id="sbody_${sec.id}">
        ${sec.items.map(it=>`
          <div class="item" id="item_${it.id}">
            <div class="item-top">
              <div class="item-text">
                <div class="item-name">${it.name}</div>
                <div class="item-desc">${it.desc}</div>
                ${it.warn?`<div class="item-warn">⚠️ ${it.warn}</div>`:''}
              </div>
            </div>
            <div class="btns">
              <button class="cBtn" id="ok_${it.id}" onclick="setItem('${it.id}','ok')">✅ 이상없음</button>
              <button class="cBtn" id="ng_${it.id}" onclick="setItem('${it.id}','ng')">❌ 하자</button>
              <button class="cBtn" id="skip_${it.id}" onclick="setItem('${it.id}','skip')">— 해당없음</button>
            </div>
            <div class="memo-wrap" id="mwrap_${it.id}">
              <textarea class="memo" id="memo_${it.id}" placeholder="하자 내용 메모 (예: 2번 창호 하단 이격 5mm)" rows="2"
                oninput="saveMemo('${it.id}',this.value)"></textarea>
            </div>
          </div>
        `).join('')}
      </div>
    `;
    wrap.appendChild(div);
  });
}

function toggleSec(id){
  const body=document.getElementById('sbody_'+id);
  const hdr=document.getElementById('shdr_'+id);
  body.classList.toggle('hidden');
  hdr.classList.toggle('collapsed');
}

function setItem(id, val){
  state[id].s=val;
  const item=document.getElementById('item_'+id);
  item.className='item state-'+val;
  ['ok','ng','skip'].forEach(v=>{
    const btn=document.getElementById(v+'_'+id);
    btn.className='cBtn'+(v===val?' '+v:'');
  });
  const mwrap=document.getElementById('mwrap_'+id);
  if(val==='ng'){mwrap.classList.add('show');}
  else{mwrap.classList.remove('show');}
  save();
  updateStats();
}

function saveMemo(id,val){
  state[id].memo=val;
  save();
}

function updateStats(){
  let ok=0,ng=0,rem=0,done=0,total=0;
  DATA.forEach(sec=>{
    let sOk=0,sDone=0;
    sec.items.forEach(it=>{
      total++;
      const s=state[it.id].s;
      if(s==='ok'){ok++;sOk++;done++;sDone++;}
      else if(s==='ng'){ng++;done++;sDone++;}
      else if(s==='skip'){done++;sDone++;}
      else rem++;
    });
    document.getElementById('sprog_'+sec.id).textContent=
      `${sDone}/${sec.items.length}`;
  });
  document.getElementById('sOk').textContent=ok;
  document.getElementById('sNg').textContent=ng;
  document.getElementById('sRem').textContent=rem;
  document.getElementById('progBar').style.width=(done/total*100)+'%';
  document.getElementById('progTxt').textContent=done;
  document.getElementById('totalTxt').textContent=total;
}

function restoreState(){
  DATA.forEach(sec=>sec.items.forEach(it=>{
    const s=state[it.id].s;
    if(s)setItem(it.id,s);
    if(state[it.id].memo){
      const ta=document.getElementById('memo_'+it.id);
      if(ta)ta.value=state[it.id].memo;
    }
  }));
}

function resetAll(){
  if(!confirm('모든 체크 내용을 초기화할까요?'))return;
  DATA.forEach(sec=>sec.items.forEach(it=>{state[it.id]={s:null,memo:''}}));
  DATA.forEach(sec=>sec.items.forEach(it=>{
    ['ok','ng','skip'].forEach(v=>{document.getElementById(v+'_'+it.id).className='cBtn';});
    document.getElementById('item_'+it.id).className='item';
    document.getElementById('mwrap_'+it.id).classList.remove('show');
    const ta=document.getElementById('memo_'+it.id);
    if(ta)ta.value='';
  }));
  save(); updateStats();
}

function showNgList(){
  const items=[];
  DATA.forEach(sec=>sec.items.forEach(it=>{
    if(state[it.id].s==='ng'){
      items.push({sec:sec.name,name:it.name,memo:state[it.id].memo});
    }
  }));
  const body=document.getElementById('modalBody');
  if(items.length===0){
    body.innerHTML='<div style="text-align:center;padding:20px;color:#6b7280;font-size:13px;">하자 항목이 없습니다 👍</div>';
  } else {
    body.innerHTML=items.map(i=>`
      <div class="ng-item">
        <div class="ng-dot"></div>
        <div>
          <div class="ng-text"><strong>[${i.sec}]</strong> ${i.name}</div>
          ${i.memo?`<div class="ng-memo">📝 ${i.memo}</div>`:''}
        </div>
      </div>
    `).join('');
  }
  document.getElementById('modalBg').classList.add('show');
}

function closeModal(e){
  if(!e||e.target===document.getElementById('modalBg'))
    document.getElementById('modalBg').classList.remove('show');
}


// 평면도 토글
function toggleFP(){
  const body = document.getElementById('fpBody');
  const arrow = document.getElementById('fpArrow');
  const show = body.style.display === 'none';
  body.style.display = show ? 'block' : 'none';
  arrow.style.transform = show ? 'rotate(0deg)' : 'rotate(-90deg)';
}

// 이미지 확대 (간단 핀치줌 대신 탭으로 2배 확대)
let zoomed = false;
function toggleImgZoom(img){
  zoomed = !zoomed;
  if(zoomed){
    img.classList.add('zoomed');
    img.style.width = '200%';
  } else {
    img.classList.remove('zoomed');
    img.style.width = '100%';
  }
}

// ── 카톡 내보내기 ──
function exportStatus(){
  let name=localStorage.getItem('chk_name')||'';
  name=prompt('점검자 이름 (카톡 취합용)', name)||'';
  if(name)localStorage.setItem('chk_name',name);

  const ng=[],ok={},skip={},rem={};
  let total=0,done=0;
  DATA.forEach(sec=>{
    let sname=sec.name.replace(/—.*$/,'').trim().replace(/^[^가-힣]+/,'').trim();
    sec.items.forEach(it=>{
      total++;
      const s=state[it.id].s;
      if(s)done++;
      if(s==='ng'){ng.push({sec:sname,name:it.name,memo:state[it.id].memo});}
      else if(s==='ok'){(ok[sname]=ok[sname]||[]).push(it.name);}
      else if(s==='skip'){(skip[sname]=skip[sname]||[]).push(it.name);}
      else{(rem[sname]=rem[sname]||[]).push(it.name);}
    });
  });
  const okN=Object.values(ok).reduce((a,b)=>a+b.length,0);
  const skipN=Object.values(skip).reduce((a,b)=>a+b.length,0);
  const remN=total-done;

  let t=`[59A 사전점검]${name?' '+name:''}\n`;
  t+=`진행 ${done}/${total} · OK ${okN} / 하자 ${ng.length} / 해당없음 ${skipN} / 미점검 ${remN}\n`;

  if(ng.length){
    t+=`\n[X] 하자 ${ng.length}건\n`;
    ng.forEach((d,i)=>{
      t+=`${i+1}. [${d.sec}] ${d.name}`;
      if(d.memo)t+=` -> ${d.memo}`;
      t+='\n';
    });
  }
  if(okN){
    t+=`\n[O] 이상없음 ${okN}건\n`;
    Object.keys(ok).forEach(s=>{t+=`· ${s}: ${ok[s].join(', ')}\n`;});
  }
  if(skipN){
    t+=`\n[-] 해당없음 ${skipN}건\n`;
    Object.keys(skip).forEach(s=>{t+=`· ${s}: ${skip[s].join(', ')}\n`;});
  }
  if(remN){
    t+=`\n[ ] 미점검 ${remN}건\n`;
    Object.keys(rem).forEach(s=>{t+=`· ${s}: ${rem[s].length}개\n`;});
  }
  document.getElementById('exportText').value=t;
  document.getElementById('exportBg').classList.add('show');
}
function copyExport(){
  const ta=document.getElementById('exportText');
  ta.select();ta.setSelectionRange(0,99999);
  let done=false;
  try{navigator.clipboard.writeText(ta.value);done=true;}catch(e){}
  if(!done){try{document.execCommand('copy');done=true;}catch(e){}}
  alert(done?'복사됨! 카톡방에 붙여넣으세요':'복사 실패 - 길게 눌러 직접 복사하세요');
}
function closeExport(){document.getElementById('exportBg').classList.remove('show');}
</script>
